specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: TensorFlow
providerId: tensorflow
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Machine Learning
  - Deep Learning
  - Open Source
  - AI
description: >-
  TensorFlow is an open-source machine-learning framework released under the Apache License 2.0; it is
  a library you self-host, not a managed API service, and it carries no commercial pricing, plan tiers,
  or per-call charges. Hosting / inference cost depends entirely on the infrastructure (Google Cloud,
  AWS, on-prem GPUs, edge devices) on which the user runs TensorFlow models.
sources:
  - https://www.tensorflow.org/
  - https://github.com/tensorflow/tensorflow/blob/master/LICENSE
plans:
  - id: tensorflow-open-source
    name: Open Source
    type: freemium
    description: Apache 2.0 licensed open-source library; free to download, modify, and run.
    entries:
      - label: Library Use
        name: library_use
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: TensorFlow Core (Python)
      - name: TensorFlow.js
      - name: TensorFlow Lite
      - name: TensorFlow Serving
      - name: TensorFlow Extended (TFX)
      - name: Apache 2.0 License
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
